name: 100% Mathematical Integrity Verification

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/verify.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json
      - name: Run Mathematical Verification
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/verify_integrity.js
